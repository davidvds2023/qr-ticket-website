<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Ticket</title>
  <link rel="stylesheet" href="print.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="screen-toolbar">
  <button onclick="window.print()">Afdrukken</button>
</div>

<div id="labels"></div>

<script>
const data = JSON.parse(localStorage.getItem("printData"));
const container = document.getElementById("labels");

if (!data) {
  container.innerHTML = "<p class='error-message'>Geen data gevonden.</p>";
} else {
  for (let i = 0; i < Number(data.aantal); i++) {
    const page = document.createElement("div");
    page.className = "page";

    const label = document.createElement("div");
    label.className = "label";

    const qr = document.createElement("div");
    qr.className = "qr";

    const price = document.createElement("div");
    price.className = "price";
    price.textContent = "€ " + Number(data.prijs).toFixed(2);

    const code = document.createElement("div");
    code.className = "code";
    code.textContent = data.artikelcode;

    label.appendChild(qr);
    label.appendChild(price);
    label.appendChild(code);

    page.appendChild(label);
    container.appendChild(page);

    new QRCode(qr, {
      text: data.artikelcode,
      width: 62,
      height: 62,
      correctLevel: QRCode.CorrectLevel.M
    });
  }
}
</script>

</body>
</html>
