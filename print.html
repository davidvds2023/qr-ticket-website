<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Print Ticket</title>
  <link rel="stylesheet" href="print.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="toolbar">
    <h2>Printvoorbeeld</h2>
    <button onclick="window.print()">Print</button>
  </div>

  <div id="labels" class="labels-container"></div>

  <script>
    const data = JSON.parse(localStorage.getItem("printData"));
    const container = document.getElementById("labels");

    if (!data) {
      container.innerHTML = "<p>Geen data gevonden.</p>";
    } else {
      for (let i = 0; i < data.aantal; i++) {
        const page = document.createElement("div");
        page.className = "print-page";

        const label = document.createElement("div");
        label.className = "label";

        const qrDiv = document.createElement("div");
        qrDiv.className = "qr";

        const price = document.createElement("div");
        price.className = "price";
        price.textContent = "€ " + Number(data.prijs).toFixed(2);

        const code = document.createElement("div");
        code.className = "code";
        code.textContent = data.artikelcode;

        const omschrijving = document.createElement("div");
        omschrijving.className = "omschrijving";
        omschrijving.textContent = data.omschrijving;

        label.appendChild(qrDiv);
        label.appendChild(price);
        label.appendChild(code);
        label.appendChild(omschrijving);

        page.appendChild(label);
        container.appendChild(page);

        new QRCode(qrDiv, {
          text: data.artikelcode,
          width: 120,
          height: 120
        });
      }
    }
  </script>
</body>
</html>
