<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musea Brugge | Ticket Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <div class="logo-group">
          <div class="logo-box">
            <img src="logo-musea-brugge-1.png" alt="Musea Brugge logo 1" onerror="this.style.display='none'; this.parentElement.classList.add('logo-placeholder')">
            <span class="logo-fallback">Logo 1</span>
          </div>

          <div class="logo-box">
            <img src="logo-musea-brugge-2.png" alt="Musea Brugge logo 2" onerror="this.style.display='none'; this.parentElement.classList.add('logo-placeholder')">
            <span class="logo-fallback">Logo 2</span>
          </div>
        </div>

        <div class="hero-badge">Ticket systeem</div>
      </div>

      <div class="hero-content">
        <div>
          <p class="eyebrow">Musea Brugge</p>
          <h1>QR Ticket Generator</h1>
          <p class="subtitle">
            Typ een artikelcode in, kies zelf de prijs en bepaal hoeveel tickets je wil afdrukken.
          </p>
        </div>
      </div>
    </header>

    <main class="main-grid">
      <section class="panel panel-search">
        <div class="panel-header">
          <h2>Artikel zoeken</h2>
          <p>Zoek op exacte artikelcode.</p>
        </div>

        <div class="form-block">
          <label for="search" class="field-label">Artikelcode</label>
          <input
            type="text"
            id="search"
            placeholder="Bijv. SHOSTA-1134"
            autocomplete="off"
          >
        </div>

        <div id="status" class="status">Data wordt geladen...</div>
      </section>

      <section class="panel panel-result">
        <div class="panel-header">
          <h2>Ticketinstellingen</h2>
          <p>Gevonden artikel en afdrukinstellingen.</p>
        </div>

        <div id="result" class="result hidden"></div>
      </section>
    </main>
  </div>

  <script>
    let data = [];

    fetch('data.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('Kon data.json niet laden');
        }
        return response.json();
      })
      .then(json => {
        data = json;
        document.getElementById('status').textContent = 'Data geladen. Typ nu een artikelcode.';
      })
      .catch(error => {
        document.getElementById('status').textContent = 'Fout bij laden van data.json';
        console.error(error);
      });

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function zoekProductAutomatisch() {
      const input = document.getElementById('search');
      const value = input.value.toLowerCase().trim();
      const resultDiv = document.getElementById('result');

      if (!value) {
        resultDiv.classList.add('hidden');
        resultDiv.innerHTML = '';
        return;
      }

      const gevonden = data.find(product =>
        String(product.artikelcode).toLowerCase() === value
      );

      resultDiv.classList.remove('hidden');

      if (!gevonden) {
        resultDiv.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⌕</div>
            <div>
              <strong>Geen artikel gevonden</strong>
              <p>Er bestaat geen artikel met code <span>${escapeHtml(input.value)}</span>.</p>
            </div>
          </div>
        `;
        return;
      }

      resultDiv.innerHTML = `
        <div class="product-card">
          <div class="article-code-chip">${escapeHtml(gevonden.artikelcode)}</div>

          <div class="article-main">
            <div class="article-block">
              <span class="mini-label">Artikelcode</span>
              <div class="article-code-large">${escapeHtml(gevonden.artikelcode)}</div>
            </div>
          </div>

          <div class="settings-grid">
            <div class="setting-box">
              <label for="customPrijs" class="field-label">Prijs op ticket</label>
              <input type="number" id="customPrijs" min="0" step="0.01" value="${Number(gevonden.prijs).toFixed(2)}">
            </div>

            <div class="setting-box">
              <label for="printAantal" class="field-label">Aantal tickets</label>
              <input type="number" id="printAantal" min="1" value="1">
            </div>
          </div>

          <div class="action-row">
            <button class="print-btn" onclick='printTicket(${JSON.stringify(gevonden)})'>
              Ticket(s) afdrukken
            </button>
          </div>
        </div>
      `;
    }

    function printTicket(product) {
      const aantalInput = document.getElementById('printAantal');
      const prijsInput = document.getElementById('customPrijs');

      const printAantal = Number(aantalInput.value);
      const customPrijs = Number(prijsInput.value);

      if (!printAantal || printAantal < 1) {
        alert('Geef een geldig aantal in.');
        return;
      }

      if (isNaN(customPrijs) || customPrijs < 0) {
        alert('Geef een geldige prijs in.');
        return;
      }

      const printData = {
        artikelcode: product.artikelcode,
        prijs: customPrijs,
        aantal: printAantal
      };

      localStorage.setItem('printData', JSON.stringify(printData));
      window.open('print.html', '_blank');
    }

    document.getElementById('search').addEventListener('input', zoekProductAutomatisch);
  </script>
</body>
</html>
