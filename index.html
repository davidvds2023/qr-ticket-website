<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Ticket Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">
    <div class="card">
      <div class="topbar">
        <div>
          <p class="eyebrow">Ticket systeem</p>
          <h1>Zoek artikel</h1>
          <p class="subtitle">Typ een artikelcode in. Kies zelf de prijs en hoeveel tickets je wil printen.</p>
        </div>
      </div>

      <div class="search-box single-column">
        <label for="search" class="field-label">Artikelcode</label>
        <input
          type="text"
          id="search"
          placeholder="Bijv. SHOSTA-1134"
          autocomplete="off"
        >
      </div>

      <div id="status" class="status">Data wordt geladen...</div>

      <div id="result" class="result hidden"></div>
    </div>
  </div>

  <script>
    let data = [];

    fetch('data.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('Kon data.json niet laden');
        }
        return response.json();
      })
      .then(json => {
        data = json;
        document.getElementById('status').textContent = 'Data geladen. Typ nu een artikelcode.';
      })
      .catch(error => {
        document.getElementById('status').textContent = 'Fout bij laden van data.json';
        console.error(error);
      });

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function zoekProductAutomatisch() {
      const input = document.getElementById('search');
      const value = input.value.toLowerCase().trim();
      const resultDiv = document.getElementById('result');

      if (!value) {
        resultDiv.classList.add('hidden');
        resultDiv.innerHTML = '';
        return;
      }

      const gevonden = data.find(product =>
        String(product.artikelcode).toLowerCase() === value
      );

      resultDiv.classList.remove('hidden');

      if (!gevonden) {
        resultDiv.innerHTML = `
          <div class="empty-state">
            Geen artikel gevonden met code <strong>${escapeHtml(input.value)}</strong>.
          </div>
        `;
        return;
      }

      resultDiv.innerHTML = `
        <div class="product-card">
          <div class="product-header">
            <div>
              <p class="product-label">Gevonden artikel</p>
              <h2>${escapeHtml(gevonden.artikelcode)}</h2>
            </div>
          </div>

          <div class="product-grid">
            <div class="info-box">
              <span class="info-title">Artikelcode</span>
              <span class="info-value">${escapeHtml(gevonden.artikelcode)}</span>
            </div>

            <div class="info-box">
              <span class="info-title">Standaard prijs</span>
              <span class="info-value">€ ${Number(gevonden.prijs).toFixed(2)}</span>
            </div>
          </div>

          <div class="form-grid">
            <div class="print-controls">
              <label for="customPrijs" class="field-label">Prijs op ticket</label>
              <input type="number" id="customPrijs" min="0" step="0.01" value="${Number(gevonden.prijs).toFixed(2)}">
            </div>

            <div class="print-controls">
              <label for="printAantal" class="field-label">Aantal tickets</label>
              <input type="number" id="printAantal" min="1" value="1">
            </div>
          </div>

          <div class="actions">
            <button class="print-btn" onclick='printTicket(${JSON.stringify(gevonden)})'>
              Print ticket(s)
            </button>
          </div>
        </div>
      `;
    }

    function printTicket(product) {
      const aantalInput = document.getElementById('printAantal');
      const prijsInput = document.getElementById('customPrijs');

      const printAantal = Number(aantalInput.value);
      const customPrijs = Number(prijsInput.value);

      if (!printAantal || printAantal < 1) {
        alert('Geef een geldig aantal in.');
        return;
      }

      if (isNaN(customPrijs) || customPrijs < 0) {
        alert('Geef een geldige prijs in.');
        return;
      }

      const printData = {
        artikelcode: product.artikelcode,
        prijs: customPrijs,
        aantal: printAantal
      };

      localStorage.setItem('printData', JSON.stringify(printData));
      window.open('print.html', '_blank');
    }

    document.getElementById('search').addEventListener('input', zoekProductAutomatisch);
  </script>
</body>
</html>
