<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musea Brugge | Ticket Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="logos">
      <img src="logo-musea-brugge-1.png">
      <img src="logo-musea-brugge-2.png">
    </div>

    <h1>QR Ticket Generator</h1>
    <p>Typ een artikelcode en print tickets</p>
  </header>

  <!-- SEARCH -->
  <div class="card">
    <label>Artikelcode</label>
    <input id="search" placeholder="Bijv. SHOSTA-1134">
  </div>

  <!-- RESULT -->
  <div id="result"></div>

</div>

<!-- FOOTER -->
<footer class="footer">
  <div>
    <strong>Musea Brugge</strong><br>
    Dijver 12<br>
    8000 Brugge (België)
  </div>

  <div>
    📧 <a href="mailto:musea.reservatie@brugge.be">musea.reservatie@brugge.be</a><br>
    📱 <a href="tel:+3250448743">+32 50 44 87 43</a>
  </div>
</footer>

<script>
let data = [];

fetch('data.json')
  .then(res => res.json())
  .then(json => data = json);

document.getElementById('search').addEventListener('input', function () {
  const value = this.value.toLowerCase();

  const product = data.find(p =>
    p.artikelcode.toLowerCase() === value
  );

  const result = document.getElementById('result');

  if (!product) {
    result.innerHTML = "";
    return;
  }

  result.innerHTML = `
    <div class="card">
      <h2>${product.artikelcode}</h2>

      <label>Prijs</label>
      <input type="number" id="prijs" value="${product.prijs}" step="0.01">

      <label>Aantal</label>
      <input type="number" id="aantal" value="1">

      <button onclick='printTicket(${JSON.stringify(product)})'>
        Print
      </button>
    </div>
  `;
});

function printTicket(product) {
  const prijs = document.getElementById("prijs").value;
  const aantal = document.getElementById("aantal").value;

  localStorage.setItem("printData", JSON.stringify({
    artikelcode: product.artikelcode,
    prijs: prijs,
    aantal: aantal
  }));

  window.open("print.html");
}
</script>

</body>
</html>
